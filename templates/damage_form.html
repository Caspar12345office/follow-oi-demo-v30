{% extends 'base.html' %}{% block title %}Schade melden{% endblock %}{% block content %}<div class="card"><form method="post" enctype="multipart/form-data"><div class="form-row"><div><label>Klant</label><select name="client_id">{% for c in clients %}<option value="{{ c.id }}" {% if preselect and preselect|string==c.id|string %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div><div><label>Asset</label><select name="asset_id"><option value="">Geen</option>{% for a in assets %}<option value="{{ a.id }}">{{ a.asset_code }} · {{ a.category }}</option>{% endfor %}</select></div><div><label>Contact</label><input name="contact_name"></div><div><label>E-mail</label><input name="contact_email"></div><div><label>Telefoon</label><input name="contact_phone"></div><div><label>Locatie</label><input name="location"></div><div><label>Ruimte</label><input name="room"></div><div><label>Urgentie</label><select name="urgency"><option>Laag</option><option>Middel</option><option>Hoog</option></select></div><div><label>Foto</label><input type="file" name="photo"></div></div><label>Omschrijving</label><textarea name="description" required></textarea><br><br><button class="btn">Melden</button></form></div>{% endblock %}
