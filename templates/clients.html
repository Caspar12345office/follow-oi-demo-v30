{% extends 'base.html' %}{% block title %}Klanten{% endblock %}{% block content %}<div class='card'><h2>Klanten</h2><div class='actions'><a class="btn" href="{{ url_for('client_new') }}">Nieuwe klant</a></div></div><div class='card'><table><tr><th>Naam</th><th>Contact</th><th>Accountmanager</th></tr>{% for r in rows %}<tr><td><a href="{{ url_for('client_portal', client_id=r.id) }}">{{ r.name }}</a></td><td>{{ r.contact_name }}<br>{{ r.contact_email }}</td><td>{{ r.account_manager_name }}</td></tr>{% endfor %}</table></div>{% endblock %}
