{% extends 'base.html' %}{% block title %}Marketplace beheren{% endblock %}{% block content %}<div class="card"><h2>{{ asset.asset_code }} · {{ asset.category }}</h2><p class="muted">{{ asset.client_name }} · {{ asset.location }} · {{ asset.room }}</p><form method="post"><div class="form-row"><div><label>Status</label><select name="marketplace_status"><option value="niet beschikbaar" {% if asset.marketplace_status=='niet beschikbaar' %}selected{% endif %}>Niet beschikbaar</option><option value="beschikbaar" {% if asset.marketplace_status=='beschikbaar' %}selected{% endif %}>Beschikbaar</option><option value="gereserveerd" {% if asset.marketplace_status=='gereserveerd' %}selected{% endif %}>Gereserveerd</option></select></div><div><label>Beschikbaar vanaf</label><input type="date" name="marketplace_available_from" value="{{ asset.marketplace_available_from or '' }}"></div></div><label>Toelichting voor andere facility managers</label><textarea name="marketplace_note" rows="5">{{ asset.marketplace_note or '' }}</textarea><br><br><button class="btn">Opslaan</button> <a class="btn secondary" href="{{ url_for('marketplace') }}">Terug</a></form></div>{% endblock %}
