{% extends 'base.html' %}{% block title %}{{ tr('settings') }}{% endblock %}{% block content %}<div class="card"><h2>Gebruikersinstellingen</h2>{% if saved %}<div class="flash">Instellingen opgeslagen.</div>{% endif %}<form method="post"><div class="form-row"><div><label>Taal</label><select name="language">{% for code,name in LANGUAGES.items() %}<option value="{{ code }}" {% if user.language==code %}selected{% endif %}>{{ name }}</option>{% endfor %}</select></div><div><label>Weergave</label><select name="theme_mode">{% for code,name in THEME_MODES.items() %}<option value="{{ code }}" {% if user.theme_mode==code %}selected{% endif %}>{{ name }}</option>{% endfor %}</select></div><div><label>Thema</label><select name="theme_color">{% for code,name in THEME_COLORS.items() %}<option value="{{ code }}" {% if user.theme_color==code %}selected{% endif %}>{{ name }}</option>{% endfor %}</select></div></div><br><button class="btn">Opslaan</button></form></div>{% endblock %}
