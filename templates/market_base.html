<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Follow O-I · Circulair meubelbeheer{% endblock %}</title>
<style>
  @font-face{font-family:'Jost';font-style:normal;font-weight:100 900;font-display:swap;src:url("{{ url_for('static', filename='fonts/jost-latin.woff2') }}") format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}
  :root{--accent:#0f3d3e;--accent2:#15595a;--gold:#b88a44;--bg:#f6f3ee;--ink:#1c1a16;--muted:#6f6a5f;--soft:#eef3ec;--green:#78b743;--line:#e7e1d6;--panel:#fff}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:'Jost',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{max-width:100%}
  .wrap{max-width:1180px;margin:0 auto;padding:0 28px}
  .eyebrow{display:inline-block;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;color:var(--gold)}
  .btn{display:inline-flex;align-items:center;gap:8px;border:0;border-radius:12px;padding:14px 22px;font:inherit;font-weight:600;font-size:15px;cursor:pointer;transition:transform .12s,filter .15s,box-shadow .15s}
  .btn.primary{background:var(--accent);color:#fff;box-shadow:0 12px 28px rgba(15,61,62,.22)}
  .btn.primary:hover{transform:translateY(-2px);filter:brightness(1.08)}
  .btn.gold{background:var(--gold);color:#fff;box-shadow:0 12px 28px rgba(184,138,68,.26)}
  .btn.gold:hover{transform:translateY(-2px);filter:brightness(1.05)}
  .btn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4)}
  .btn.ghost:hover{background:rgba(255,255,255,.10)}
  .btn.dark-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--line)}
  .btn.dark-ghost:hover{background:var(--soft)}
  h1,h2,h3{margin:0;letter-spacing:-.02em;font-weight:700;line-height:1.12}
  section{padding:90px 0}
  .lead{font-size:18px;color:var(--muted);max-width:680px}

  /* ---- top bar ---- */
  .nav{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line)}
  .nav .wrap{display:flex;align-items:center;justify-content:space-between;height:70px;gap:18px}
  .logo{font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-size:18px;flex-shrink:0}
  .logo small{display:block;font-size:10px;letter-spacing:.12em;color:var(--muted);font-weight:400;text-transform:none;margin-top:-2px}
  .nav-links{display:flex;align-items:center;gap:26px;font-size:14.5px;color:var(--muted)}
  .nav-links a:not(.btn):hover{color:var(--accent)}
  .nav-links a.active{color:var(--accent);font-weight:600}
  .nav-links .btn{padding:10px 18px;font-size:14px;color:#fff}
  @media(max-width:980px){.nav-links a:not(.btn){display:none}}

  /* ---- generic section heads ---- */
  .head{max-width:740px;margin-bottom:46px}
  .head h2{font-size:38px;margin:12px 0 14px;color:var(--accent)}
  .center{margin-left:auto;margin-right:auto;text-align:center}
  .center .lead{margin-left:auto;margin-right:auto}

  /* ---- page hero (inner pages) ---- */
  .phero{background:linear-gradient(135deg,#0f3d3e 0%,#15595a 60%,#0d3334 100%);color:#fff;text-align:center;padding:78px 0 86px;position:relative;overflow:hidden}
  .phero:before{content:"";position:absolute;right:-140px;top:-120px;width:440px;height:440px;border-radius:50%;border:56px solid rgba(255,255,255,.04)}
  .phero .eyebrow{color:#d9c6a3}
  .phero h1{font-size:46px;margin:14px 0 0;color:#fff;max-width:820px;margin-left:auto;margin-right:auto}
  .phero h1 .hl{color:var(--gold)}
  .phero p{font-size:18px;color:#d6e7df;max-width:620px;margin:18px auto 0}
  .gold-rule{width:64px;height:5px;border-radius:3px;background:var(--gold);margin:24px auto}

  /* ---- cards grid helpers ---- */
  .cols-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}
  .cols-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px}

  /* ---- final cta ---- */
  .cta-final{background:linear-gradient(135deg,#0f3d3e,#15595a);color:#fff;text-align:center}
  .cta-final h2{font-size:42px;color:#fff;max-width:760px;margin:0 auto 16px}
  .cta-final p{color:#d6e7df;font-size:18px;max-width:560px;margin:0 auto 30px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap}
  .contact-line{margin-top:26px;color:#bcd9c9;font-size:15px}
  .contact-line a{color:#fff;font-weight:600;text-decoration:underline}

  footer{background:#0b2a2b;color:#9fc2b1;padding:40px 0;font-size:13.5px}
  footer .wrap{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap}
  footer a:hover{color:#fff}
  .foot-links{display:flex;gap:22px;flex-wrap:wrap}
  .foot-links a{color:#cfe1da}

  {% block page_css %}{% endblock %}

  @media(max-width:980px){
    .cols-3,.cols-2{grid-template-columns:1fr}
    .head h2{font-size:30px}.cta-final h2{font-size:32px}.phero h1{font-size:34px}
    section{padding:64px 0}
  }
</style>
</head>
<body>

  <header class="nav">
    <div class="wrap">
      <a class="logo" href="{{ url_for('sales') }}">Follow O-I<small>Circulair meubelbeheer</small></a>
      <nav class="nav-links">
        <a href="{{ url_for('sales') }}" class="{{ 'active' if page=='home' }}">Home</a>
        <a href="{{ url_for('sales_oplossing') }}" class="{{ 'active' if page=='oplossing' }}">Oplossing</a>
        <a href="{{ url_for('sales_duurzaamheid') }}" class="{{ 'active' if page=='duurzaamheid' }}">Duurzaamheid</a>
        <a href="{{ url_for('sales_prijzen') }}" class="{{ 'active' if page=='prijzen' }}">Prijzen</a>
        <a href="{{ url_for('sales_contact') }}" class="{{ 'active' if page=='contact' }}">Contact</a>
        <a class="btn primary" href="{{ url_for('sales_contact') }}">Plan een demo</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer>
    <div class="wrap">
      <div>
        <div style="font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#cfe1da;margin-bottom:8px">Follow O-I</div>
        <div>© 2026 Office-Interior · circulair meubelbeheer.</div>
        <div style="margin-top:6px">info@office-interior.com · <a href="tel:+31850481444">085-0481444</a></div>
      </div>
      <div class="foot-links">
        <a href="{{ url_for('sales_oplossing') }}">Oplossing</a>
        <a href="{{ url_for('sales_duurzaamheid') }}">Duurzaamheid</a>
        <a href="{{ url_for('sales_prijzen') }}">Prijzen</a>
        <a href="{{ url_for('sales_contact') }}">Contact</a>
        <a href="{{ url_for('login') }}">Inloggen</a>
      </div>
    </div>
  </footer>

</body>
</html>
