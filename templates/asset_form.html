{% extends 'base.html' %}{% block title %}Nieuw meubilair{% endblock %}{% block content %}<div class="card"><form method="post"><div class="form-row"><div><label>Klant</label><select name="client_id">{% for c in clients %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div><div><label>Assetcode</label><input name="asset_code" required></div><div><label>RFID</label><input name="rfid" placeholder="Automatisch indien leeg"></div><div><label>Categorie</label><input name="category" required></div><div><label>Merk</label><input name="brand"></div><div><label>Model</label><input name="model"></div><div><label>Locatie</label><input name="location"></div><div><label>Ruimte</label><input name="room"></div><div><label>Verdieping</label><input name="floor"></div><div><label>Status</label><input name="status" value="in gebruik"></div><div><label>Conditie 1-5</label><input name="condition_score" value="4"></div><div><label>Aanschafdatum</label><input type="date" name="purchase_date"></div><div><label>Circulaire bron</label><input name="circular_source"></div><div><label>CO2 kg</label><input name="co2_kg" value="0"></div><div><label>Materiaal kg</label><input name="material_kg" value="0"></div><div><label>Kostenbesparing</label><input name="cost_saving_eur" value="0"></div><div><label>Marketplace status</label><select name="marketplace_status"><option value="niet beschikbaar">Niet beschikbaar</option><option value="beschikbaar">Beschikbaar</option></select></div><div><label>Beschikbaar vanaf</label><input type="date" name="marketplace_available_from"></div></div><label>Marketplace toelichting</label><textarea name="marketplace_note"></textarea><br><br><button class="btn">Opslaan</button></form></div>{% endblock %}
