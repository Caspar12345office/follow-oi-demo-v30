{% extends 'base.html' %}{% block title %}Nieuw ticket{% endblock %}{% block content %}<div class="card"><form method="post" enctype="multipart/form-data"><div class="form-row"><div><label>Klant</label><select name="client_id">{% for c in clients %}<option value="{{ c.id }}" {% if preselect and preselect|string==c.id|string %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div><div><label>Asset</label><select name="asset_id"><option value="">Geen</option>{% for a in assets %}<option value="{{ a.id }}">{{ a.asset_code }} · {{ a.category }}</option>{% endfor %}</select></div><div><label>Onderwerp</label><input name="subject" required></div><div><label>Categorie</label><input name="category"></div><div><label>Prioriteit</label><select name="priority"><option>Laag</option><option selected>Middel</option><option>Hoog</option></select></div><div><label>Locatie</label><input name="location"></div><div><label>Ruimte</label><input name="room"></div><div><label>Bijlage</label><input type="file" name="attachment"></div><div><label>Contact</label><input name="contact_name"></div><div><label>E-mail</label><input name="contact_email"></div><div><label>Telefoon</label><input name="contact_phone"></div></div><label>Bericht</label><textarea name="message" required></textarea><br><br><button class="btn">Aanmaken</button></form></div>{% endblock %}
