{% extends 'base.html' %}{% block title %}Ticket{% endblock %}{% block content %}<div class="card"><h2>{{ ticket.subject }}</h2><p class="muted">{{ ticket.client_name }} · {{ ticket.category }} · {{ ticket.location }} {{ ticket.room }}</p><p>{{ ticket.message }}</p><form method="post"><div class="form-row"><div><label>Status</label><select name="status"><option {% if ticket.status=='nieuw' %}selected{% endif %}>nieuw</option><option {% if ticket.status=='in behandeling' %}selected{% endif %}>in behandeling</option><option {% if ticket.status=='gesloten' %}selected{% endif %}>gesloten</option></select></div><div><label>Prioriteit</label><select name="priority"><option {% if ticket.priority=='Laag' %}selected{% endif %}>Laag</option><option {% if ticket.priority=='Middel' %}selected{% endif %}>Middel</option><option {% if ticket.priority=='Hoog' %}selected{% endif %}>Hoog</option></select></div></div><label>Laatste opvolging</label><textarea name="last_response">{{ ticket.last_response or '' }}</textarea><br><br><button class="btn">Opslaan</button></form></div>{% endblock %}
