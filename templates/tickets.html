{% extends 'base.html' %}{% block title %}Tickets{% endblock %}{% block content %}<div class='card'><h2>Tickets</h2><div class='actions'><a class="btn" href="{{ url_for('ticket_new') }}">Nieuw ticket</a> <a class="btn secondary" href="{{ url_for('quick_ticket') }}">Quick ticket</a></div></div><div class='card'><table><tr><th>Klant</th><th>Onderwerp</th><th>Prioriteit</th><th>Status</th></tr>{% for r in rows %}<tr><td>{{ r.client_name }}</td><td><a href="{{ url_for('ticket_detail', ticket_id=r.id) }}">{{ r.subject }}</a></td><td>{{ r.priority }}</td><td>{{ r.status }}</td></tr>{% endfor %}</table></div>{% endblock %}
