{% extends 'base.html' %}{% block title %}Offerte aanvragen{% endblock %}{% block content %}<div class="card"><form method="post"><div class="form-row"><div><label>Klant</label><select name="client_id">{% for c in clients %}<option value="{{ c.id }}" {% if preselect and preselect|string==c.id|string %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div><div><label>Meubeltype</label><input name="furniture_type" value="{{ selected_product.name if selected_product else '' }}" required></div><div><label>Aantal</label><input name="quantity" value="1" required></div><div><label>Kleur</label><input name="color"></div><div><label>Kwaliteit</label><input name="quality"></div><div><label>Leverlocatie</label><input name="delivery_location"></div><div><label>Ruimte</label><input name="room"></div><div><label>Gewenste datum</label><input type="date" name="desired_delivery_date"></div><div><label>Montage</label><select name="assembly"><option>Ja</option><option>Nee</option></select></div></div><label>Notitie</label><textarea name="note"></textarea><br><br><button class="btn">Aanvragen</button></form></div>{% endblock %}
