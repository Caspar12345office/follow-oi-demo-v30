{% extends 'base.html' %}{% block title %}RFID generator{% endblock %}{% block content %}<div class="card"><form method="post" class="form-row"><div><label>Klant</label><input name="client" value="KLANT"></div><div><label>Prefix</label><input name="prefix" value="RFID-OI"></div><div><label>Aantal</label><input name="qty" value="10"></div><div><label>Start</label><input name="start" value="1"></div><div style="align-self:end"><button class="btn">Genereren</button></div></form></div>{% if generated %}<div class="card"><h2>Codes</h2><p><a class="btn" href="{{ url_for('rfid_download', codes=generated|join(',')) }}">CSV downloaden</a></p><pre>{{ generated|join('\n') }}</pre></div>{% endif %}{% endblock %}
