{% extends 'base.html' %}{% block title %}Rechten beheren{% endblock %}{% block content %}<div class="card"><h2>{{ edited.name }}</h2><form method="post"><div class="form-row"><div><label>Rol</label><select name="role"><option value="staff" {% if edited.role=='staff' %}selected{% endif %}>Office staff</option><option value="client_admin" {% if edited.role=='client_admin' %}selected{% endif %}>Facility manager</option><option value="client_user" {% if edited.role=='client_user' %}selected{% endif %}>Klantgebruiker</option><option value="admin" {% if edited.role=='admin' %}selected{% endif %}>Admin</option></select></div><div><label>2FA</label><label><input style="width:auto" type="checkbox" name="two_factor_enabled" {% if edited.two_factor_enabled %}checked{% endif %}> Ingeschakeld</label></div></div><label>Rechten</label><div class="grid grid3">{% for p in permission_keys %}<label><input style="width:auto" type="checkbox" name="permissions" value="{{ p }}" {% if p in current_permissions %}checked{% endif %}> {{ p }}</label>{% endfor %}</div><br><button class="btn">Opslaan</button></form></div>{% endblock %}
